version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: grid07-postgres
    environment:
      POSTGRES_DB: grid07db
      POSTGRES_USER: grid07user
      POSTGRES_PASSWORD: grid07pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: grid07-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: